name: Dictionary Conversion and Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8'

      - name: Setup Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libime-bin wget jq      
          wget -q https://github.com/studyzy/imewlconverter/releases/download/v3.2.0/imewlconverter_Linux.tar.gz
          tar -xzf imewlconverter_Linux.tar.gz

      - name: Get Latest Release Version
        id: get_data
        run: |
          LATEST_RELEASE=$(curl -s https://api.github.com/repos/wuhgit/CustomPinyinDictionary/releases/latest)
          
          LATEST_VERSION=$(echo "$LATEST_RELEASE" | jq -r '.assets[].name' | grep -oP '\d{8}' | head -n 1)
          
          if [ -z "$LATEST_VERSION" ] || [ "$LATEST_VERSION" == "null" ]; then
            LATEST_VERSION=$(echo "$LATEST_RELEASE" | jq -r '.body' | grep -oP '(?<=v)\d{8}' | head -n 1)
          fi
          
          if [ -z "$LATEST_VERSION" ] || [ "$LATEST_VERSION" == "null" ]; then
            LATEST_VERSION=$(date +"%Y%m%d")
          fi
          
          echo "version=$LATEST_VERSION" >> "$GITHUB_OUTPUT"
          
          DELIMITER="EOF_$(date +%s%N)"
          echo "body<<$DELIMITER" >> "$GITHUB_OUTPUT"
          echo "$LATEST_RELEASE" | jq -r '.body' >> "$GITHUB_OUTPUT"
          echo "$DELIMITER" >> "$GITHUB_OUTPUT"

      - name: Download Dictionary
        run: |
          DICTIONARY_URL="https://github.com/wuhgit/CustomPinyinDictionary/releases/latest/download/CustomPinyinDictionary_Fcitx.dict"
          wget -q "${DICTIONARY_URL}" -O CustomPinyinDictionary_Fcitx.dict

      - name: Convert Dictionary
        run: |
          mkdir -p assets
          
          libime_pinyindict -d CustomPinyinDictionary_Fcitx.dict ./assets/CustomPinyinDictionary_Fcitx.txt
          
          cd publish
          dotnet ImeWlConverterCmd.dll -i:libpy "$GITHUB_WORKSPACE/assets/CustomPinyinDictionary_Fcitx.txt" -o:rime "$GITHUB_WORKSPACE/assets/CustomPinyinDictionary_Rime.dict.yaml" -ct:pinyin -os:linux          
      
      - name: Add Header to Rime Dictionary
        run: |
          CURRENT_TIME=$(date +"%Y-%m-%d %H:%M:%S")
          TEMP_FILE=$(mktemp)
          
          cat <<EOF > "$TEMP_FILE"
          # Rime dictionary
          # encoding: utf-8
          # $CURRENT_TIME
          # 来源: 
          #  - 百万常用词汇：https://github.com/wuhgit/CustomPinyinDictionary
          # 
          ---
          name: CustomPinyinDictionary_Rime
          version: ${{ steps.get_data.outputs.version }}
          sort: by_weight
          ...
          EOF
          
          cat "$GITHUB_WORKSPACE/assets/CustomPinyinDictionary_Rime.dict.yaml" >> "$TEMP_FILE"
          mv "$TEMP_FILE" "$GITHUB_WORKSPACE/assets/CustomPinyinDictionary_Rime.dict.yaml"
          
      - name: Create or Update Release (Overwrite Mode)
        uses: ncipollo/release-action@v1
        if: github.ref == 'refs/heads/main'
        with:
          token: ${{ github.token }}
          name: "CustomPinyinDictionary v${{ steps.get_data.outputs.version }}" 
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: true
          tag: "latest" 
          body: |
            Converted dictionary from https://github.com/wuhgit/CustomPinyinDictionary 
            ${{ steps.get_data.outputs.body }}
          artifacts: "assets/*"
